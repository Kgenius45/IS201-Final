<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Clone</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #2d2d2d;
            --accent: #818384;
            --correct: #6aaa64;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --text: #ffffff;
            --border: #3a3a3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #6aaa64, #b59f3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9em;
            color: var(--accent);
            font-weight: 500;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .tile {
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: 700;
            cursor: default;
            background: var(--secondary);
            color: var(--text);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tile.filled {
            border-color: var(--accent);
            animation: popIn 0.15s ease-out;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .tile.flip {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% {
                transform: rotateX(0);
            }
            50% {
                transform: rotateX(90deg);
            }
            100% {
                transform: rotateX(0);
            }
        }

        .tile.correct {
            background: var(--correct);
            border-color: var(--correct);
            box-shadow: 0 4px 12px rgba(106, 170, 100, 0.3);
        }

        .tile.present {
            background: var(--present);
            border-color: var(--present);
            box-shadow: 0 4px 12px rgba(181, 159, 59, 0.3);
        }

        .tile.absent {
            background: var(--absent);
            border-color: var(--absent);
        }

        .message {
            text-align: center;
            min-height: 30px;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .message.error {
            animation: shake 0.4s ease-in-out;
            color: #ff6b6b;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(32px, 1fr));
            gap: 6px;
            margin-bottom: 20px;
        }

        .key {
            padding: 10px 8px;
            border: none;
            border-radius: 4px;
            background: var(--secondary);
            color: var(--text);
            font-size: 0.75em;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
        }

        .key:hover:not(:disabled) {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .key:active:not(:disabled) {
            transform: translateY(0);
        }

        .key:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .key.correct {
            background: var(--correct);
            border-color: var(--correct);
        }

        .key.present {
            background: var(--present);
            border-color: var(--present);
        }

        .key.absent {
            background: var(--absent);
            border-color: var(--absent);
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            background: var(--accent);
            color: var(--text);
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn:hover {
            background: var(--correct);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn.secondary {
            background: var(--secondary);
            border: 2px solid var(--border);
        }

        .btn.secondary:hover {
            background: var(--border);
        }

        .stats {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 0.9em;
            color: var(--accent);
            margin-top: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: var(--secondary);
            border: 2px solid var(--correct);
            border-radius: 8px;
            padding: 30px;
            max-width: 400px;
            text-align: center;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .modal-content .word {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--correct);
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .modal-content .stats-line {
            margin: 10px 0;
            color: var(--accent);
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 2em;
            }

            .tile {
                font-size: 1.5em;
            }

            .key {
                padding: 8px 4px;
                font-size: 0.65em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WORDLE</h1>
            <p>Guess the word in 6 tries</p>
        </div>

        <div class="message" id="message"></div>

        <div class="board" id="board"></div>

        <div class="keyboard" id="keyboard"></div>

        <div class="controls">
            <button class="btn" id="submitBtn">Enter</button>
            <button class="btn secondary" id="resetBtn">New Game</button>
        </div>

        <div class="stats">
            <div id="stats"></div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <div class="word" id="modalWord"></div>
            <div class="stats-line">Attempts: <span id="modalAttempts"></span>/6</div>
            <br>
            <button class="btn" onclick="location.reload()">Play Again</button>
        </div>
    </div>

            'JERRY', 'JESTS', 'JETTY', 'JEWEL', 'JIBED', 'JIBER', 'JIBES', 'JIFFY', 'JIHAD', 'JILTS',

            'JUNCO', 'JUNES', 'JUNKS', 'JUNKY', 'JUROR', 'JURORS', 'JUSTLY', 'JUROR'
        ];

        let secretWord = '';
        let currentGuess = '';
        let guesses = [];
        let gameOver = false;
        let won = false;
        const keyStates = {};

        function initGame() {
            secretWord = COMMON_WORDS[Math.floor(Math.random() * COMMON_WORDS.length)];
            currentGuess = '';
            guesses = [];
            gameOver = false;
            won = false;
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('error');
            renderBoard();
            renderKeyboard();
            updateStats();
        }

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    
                    const letterIndex = i * 5 + j;
                    const allLetters = guesses.flatMap(g => g.letters).join('') + currentGuess;
                    
                    if (letterIndex < allLetters.length) {
                        const letter = allLetters[letterIndex];
                        tile.textContent = letter;
                        tile.classList.add('filled');
                        
                        if (i < guesses.length) {
                            const guess = guesses[i];
                            if (guess.evaluation[j] === 'correct') {
                                tile.classList.add('correct', 'flip');
                            } else if (guess.evaluation[j] === 'present') {
                                tile.classList.add('present', 'flip');
                            } else if (guess.evaluation[j] === 'absent') {
                                tile.classList.add('absent', 'flip');
                            }
                            tile.style.animationDelay = `${j * 0.1}s`;
                        }
                    }
                    
                    board.appendChild(tile);
                }
            }
        }

        function renderKeyboard() {
            const keyboard = document.getElementById('keyboard');
            keyboard.innerHTML = '';
            
            const rows = [
                'QWERTYUIOP'.split(''),
                'ASDFGHJKL'.split(''),
                'ZXCVBNM'.split('')
            ];
            
            rows.forEach(row => {
                row.forEach(letter => {
                    const button = document.createElement('button');
                    button.textContent = letter;
                    button.className = 'key';
                    
                    if (keyStates[letter]) {
                        button.classList.add(keyStates[letter]);
                    }
                    
                    button.onclick = () => handleKeyPress(letter);
                    button.disabled = gameOver;
                    keyboard.appendChild(button);
                });
            });
        }

        function handleKeyPress(letter) {
            if (gameOver) return;
            
            if (letter === 'BACKSPACE') {
                currentGuess = currentGuess.slice(0, -1);
            } else if (currentGuess.length < 5) {
                currentGuess += letter;
            }
            
            renderBoard();
        }

        function evaluateGuess(guess) {
            const evaluation = new Array(5).fill('absent');
            const secretLetters = secretWord.split('');
            const guessLetters = guess.split('');
            
            // First pass: mark correct letters
            for (let i = 0; i < 5; i++) {
                if (guessLetters[i] === secretLetters[i]) {
                    evaluation[i] = 'correct';
                    secretLetters[i] = null;
                    guessLetters[i] = null;
                }
            }
            
            // Second pass: mark present letters
            for (let i = 0; i < 5; i++) {
                if (guessLetters[i] !== null) {
                    const index = secretLetters.indexOf(guessLetters[i]);
                    if (index !== -1) {
                        evaluation[i] = 'present';
                        secretLetters[index] = null;
                    }
                }
            }
            
            return evaluation;
        }

        function updateKeyStates(evaluation, letters) {
            for (let i = 0; i < 5; i++) {
                const letter = letters[i];
                const currentState = keyStates[letter];
                const newState = evaluation[i];
                
                if (newState === 'correct') {
                    keyStates[letter] = 'correct';
                } else if (newState === 'present' && currentState !== 'correct') {
                    keyStates[letter] = 'present';
                } else if (!currentState) {
                    keyStates[letter] = 'absent';
                }
            }
        }

        function submit() {
            if (gameOver || currentGuess.length !== 5) {
                if (currentGuess.length !== 5) {
                    const message = document.getElementById('message');
                    message.textContent = 'Word must be 5 letters';
                    message.classList.add('error');
                    setTimeout(() => message.classList.remove('error'), 400);
                }
                return;
            }
            
            if (!WORD_LIST.includes(currentGuess)) {
                const message = document.getElementById('message');
                message.textContent = 'Not in word list';
                message.classList.add('error');
                setTimeout(() => message.classList.remove('error'), 400);
                return;
            }
            
            const evaluation = evaluateGuess(currentGuess);
            updateKeyStates(evaluation, currentGuess.split(''));
            guesses.push({ letters: currentGuess.split(''), evaluation });
            currentGuess = '';
            
            renderBoard();
            renderKeyboard();
            
            if (evaluation.every(e => e === 'correct')) {
                gameOver = true;
                won = true;
                showModal();
            } else if (guesses.length === 6) {
                gameOver = true;
                showModal();
            }
            
            updateStats();
        }

        function showModal() {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const word = document.getElementById('modalWord');
            const attempts = document.getElementById('modalAttempts');
            
            if (won) {
                title.textContent = '🎉 You Won!';
                title.style.color = 'var(--correct)';
            } else {
                title.textContent = '😢 Game Over';
                title.style.color = 'var(--present)';
            }
            
            word.textContent = secretWord;
            attempts.textContent = guesses.length;
            
            modal.classList.add('active');
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            stats.innerHTML = `<strong>Attempt ${guesses.length}/6</strong>`;
        }

        // Event listeners
        document.getElementById('submitBtn').onclick = submit;
        document.getElementById('resetBtn').onclick = initGame;

        document.addEventListener('keydown', (e) => {
            if (gameOver) return;
            
            const key = e.key.toUpperCase();
            
            if (/^[A-Z]$/.test(key)) {
                handleKeyPress(key);
            } else if (key === 'ENTER') {
                submit();
            } else if (key === 'BACKSPACE') {
                handleKeyPress('BACKSPACE');
            }
        });

        // Start the game
        initGame();
    </script>
