<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #2d2d2d;
            --accent: #818384;
            --correct: #6aaa64;
            --text: #ffffff;
            --border: #3a3a3c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3em;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #6aaa64, #b59f3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.1em;
            color: var(--accent);
            font-weight: 400;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .game-card {
            background: var(--secondary);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            overflow: hidden;
            position: relative;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .game-card:hover {
            border-color: var(--correct);
            box-shadow: 0 8px 24px rgba(106, 170, 100, 0.2);
            transform: translateY(-4px);
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-icon {
            font-size: 3em;
            min-width: 60px;
        }

        .game-info h2 {
            font-size: 1.5em;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .game-info p {
            color: var(--accent);
            font-size: 0.95em;
            margin: 0;
        }

        .game-arrow {
            margin-left: auto;
            font-size: 1.5em;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .game-card:hover .game-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        .footer {
            text-align: center;
            margin-top: 50px;
            color: var(--accent);
            font-size: 0.9em;
        }

        @media (max-width: 400px) {
            .header h1 {
                font-size: 2em;
            }

            .game-card {
                padding: 20px;
            }

            .game-icon {
                font-size: 2em;
            }

            .game-info h2 {
                font-size: 1.1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Game Hub</h1>
            <p>Pick a game and play</p>
        </div>

        <div class="games-grid">
            <a href="wordle.html" class="game-card">
                <div class="game-icon">📝</div>
                <div class="game-info">
                    <h2>Wordle</h2>
                    <p>Guess the word in 6 tries</p>
                </div>
                <div class="game-arrow">→</div>
            </a>
        </div>

        <div class="footer">
            <p>More games coming soon! 🎮</p>
        </div>
    </div>
</body>
</html>
